<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Usage Dashboard — Static (embedded)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="embedded">
  <div class="container">
    <header class="site-header">
      <h1>Usage & Statistics Dashboard</h1> 
        <button id="layoutToggle" class="layout-toggle" title="Toggle charts stacked / compact">
          <!-- Compact icon: two boxes side-by-side -->
          <svg class="icon icon-compact" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <rect x="3" y="4" width="8.5" height="16" rx="1" />
            <rect x="12.5" y="4" width="8.5" height="16" rx="1" />
          </svg>
          <!-- Stacked icon: two boxes, one above the other -->
          <svg class="icon icon-stacked" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <rect x="3" y="3" width="18" height="8.5" rx="1" />
            <rect x="3" y="12.5" width="18" height="8.5" rx="1" />
          </svg>
          <span id="layoutToggleLabel">Stack</span>
        </button>
      <hr />
      <div style="display:flex;align-items:center;gap:12px;">
        <p class="muted" style="margin:0;">Usage and statistics for the dates between <span id="startDate">—</span> and <span id="endDate">—</span></p>
        
      </div>
    </header>

    <main>

      <section class="card" id="totals">
        <div class="card-left">
          <h2 id="totalValue">—</h2>
          <div class="muted" id="totalLabel">Total data consumed from the portal</div>
        </div>
        <div class="card-right ">
          <canvas id="monthlyChart"></canvas>
        </div>
      </section>

      <section class="grid">

        <div class="card chart-card">
          <div class="card-cap">
            <div class="cap-left">
              <h3>Datasets</h3>
              <div id="datasetsSummary" class="muted"></div>
            </div>
            <div class="cap-right muted cap-note">From between <span class="cap-start">—</span> and <span class="cap-end">—</span></div>
          </div>
          <div class="card-body">
            <canvas id="datasetsChart"></canvas>
          </div>
        </div>  

        <div class="card chart-card">
          <div class="card-cap">
            <div class="cap-left">
              <h3>Organs</h3>
              <div id="organsSummary" class="muted"></div>
            </div>
            <div class="cap-right muted cap-note">From between <span class="cap-start">—</span> and <span class="cap-end">—</span></div>
          </div>
          <div class="card-body">
            <canvas id="organsChart"></canvas>
          </div>
        </div>  
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
  <script>
    (function(){
      function applyLayoutState(layout) {
        const grid = document.querySelector('.grid');
        if (!grid) return;
        if (layout === 'stack' || layout === 'single' || layout === 'single-column') grid.classList.add('single-column');
        else grid.classList.remove('single-column');
        const label = document.getElementById('layoutToggleLabel');
        const toggleBtn = document.getElementById('layoutToggle');
        if (grid.classList.contains('single-column')) {
          if (label) label.textContent = 'Stacked';
          if (toggleBtn) toggleBtn.classList.add('is-stack');
        } else {
          if (label) label.textContent = 'Compact';
          if (toggleBtn) toggleBtn.classList.remove('is-stack');
        }
      }

      const toggle = document.getElementById('layoutToggle');
      if (toggle) {
        // initialize label and icon to current state
        applyLayoutState(new URLSearchParams(window.location.search || '').get('layout'));
        toggle.addEventListener('click', function(){
          const grid = document.querySelector('.grid');
          if (!grid) return;
          const isStack = grid.classList.toggle('single-column');
          // update label
          const label = document.getElementById('layoutToggleLabel');
          if (label) label.textContent = isStack ? 'Stacked' : 'Compact';
          if (isStack) toggle.classList.add('is-stack'); else toggle.classList.remove('is-stack');
          // update URL param in child without reload
          try {
            const params = new URLSearchParams(window.location.search || '');
            if (isStack) params.set('layout', 'stack'); else params.delete('layout');
            const newUrl = window.location.pathname + (params.toString() ? ('?' + params.toString()) : '');
            history.replaceState(null, '', newUrl);
          } catch (err) {}
          // notify parent frame if present so it can remember the user's choice
          try {
            if (window.parent && window.parent !== window) {
              window.parent.postMessage({ type: 'layout-changed', layout: isStack ? 'stack' : 'side', src: window.location.pathname }, '*');
            }
          } catch (err) {}
        });
      }
    })();
  </script>
</body>
</html>
